services:
  app:
    build: .
    environment:
      RAILS_ENV: development
      PORT: 3002
      DATABASE_URL: mysql2://root:expertiza@db:3306/reimplementation?
      CACHE_STORE: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/1
    ports:
      - "3002:3002"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_PASSWORD: expertiza
      MYSQL_ROOT_PASSWORD: expertiza
    ports:
      - "3306:3306"
    volumes:
      - expertiza-mysql:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-pexpertiza"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - expertiza-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  expertiza-mysql:
  expertiza-redis:
