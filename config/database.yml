default: &default
  adapter: mysql2
  encoding: utf8mb4
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  port: 3306
  socket: /var/run/mysqld/mysqld.sock

# Docker Compose sets DATABASE_URL (e.g. mysql2://root:expertiza@db:3306/reimplementation?).
# Local runs often omit it; use host MySQL on 3307 (compose maps db:3306 -> host:3307).
<% local_default = 'mysql2://root:expertiza@127.0.0.1:3307/reimplementation?'
   resolved_url = ENV['DATABASE_URL'].to_s.strip
   resolved_url = local_default if resolved_url.empty? %>

development:
  <<: *default
  url: <%= resolved_url.gsub('?', '_development?') %>

test:
  <<: *default
  url: <%= resolved_url.gsub('?', '_test?') %>

production:
  <<: *default
  url: <%= ENV.fetch('DATABASE_URL').gsub('?', '_production?') %>