providers:
  google-ncsu:
    display_name: Google NCSU
    issuer: https://accounts.google.com
    client_id: <%= ENV['GOOG_CLIENT_ID'] %>
    client_secret: <%= ENV['GOOG_CLIENT_SECRET'] %>
    redirect_uri: http://localhost:3000/auth/callback
    scopes: openid email profile
    discovery: true

