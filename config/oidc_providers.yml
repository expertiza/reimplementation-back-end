providers:
  google-ncsu:
    display_name: Google NCSU
    issuer: https://accounts.google.com
    client_id: <%= ENV['GOOG_CLIENT_ID'] %>
    client_secret: <%= ENV['GOOG_CLIENT_SECRET'] %>
    redirect_uri: <%= ENV['GOOG_REDIRECT_URI'] %>

# Add more providers here (values below are examples, not real credentials):

# Provider key used to fetch config
# okta:
#   Name shown to users in the login dropdown
#   display_name: Okta

#   OIDC issuer URL, used to fetch .well-known/openid-configuration
#   issuer: https://dev-123456.okta.com

#   OAuth client credentials, register with the provider to obtain these
#   client_id: 0oa1b2c3d4e5f6g7h8i9
#   client_secret: AbCdEfGhIjKlMnOpQrStUvWxYz0123456789

#   Where the IdP redirects after authentication, must match provider registration
#   This should probably point to the frontend callback endpoint
#   redirect_uri: http://localhost:3000/auth/callback

#   Space-separated OIDC scopes, defaults to "openid email profile" if omitted
#   scopes: openid email profile